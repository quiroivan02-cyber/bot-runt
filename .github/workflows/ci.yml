name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile script
        run: python -m py_compile runt_automation.py

      - name: Import dependencies
        run: |
          python - <<'PY'
          import selenium
          import gspread
          import oauth2client
          import PIL
          import dotenv
          import requests
          import groq
          import cryptography
          print("imports ok")
          PY

