<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bot RUNT Dashboard</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1d2430;
        --muted: #687385;
        --line: #d9dee7;
        --primary: #1463ff;
        --danger: #c83232;
        --ok: #137a4b;
        --warn: #996800;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }

      .wrap {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
      }

      .topbar {
        min-height: 72px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0;
      }

      .subtitle {
        margin-top: 4px;
        color: var(--muted);
        font-size: 14px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button, a.button {
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 14px;
        background: var(--panel);
        color: var(--text);
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      button.primary { background: var(--primary); border-color: var(--primary); color: white; }
      button.danger { border-color: #f0c4c4; color: var(--danger); }
      button:disabled { opacity: .55; cursor: not-allowed; }

      main {
        padding: 24px 0 40px;
      }

      .grid {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      .panel h2 {
        margin: 0;
        padding: 16px 16px 0;
        font-size: 15px;
      }

      .status {
        padding: 16px;
        display: grid;
        gap: 12px;
      }

      .metric {
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
      }

      .metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .metric strong {
        display: block;
        margin-top: 4px;
        font-size: 18px;
      }

      .logs {
        height: 460px;
        overflow: auto;
        padding: 14px 16px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
        line-height: 1.55;
        white-space: pre-wrap;
      }

      .log { border-bottom: 1px solid #eef1f5; padding: 5px 0; }
      .log.success { color: var(--ok); }
      .log.warning { color: var(--warn); }
      .log.error { color: var(--danger); }

      .table-wrap {
        overflow: auto;
        max-height: 420px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
      }

      th, td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
        text-align: left;
        white-space: nowrap;
      }

      th {
        position: sticky;
        top: 0;
        background: var(--panel);
        color: var(--muted);
        font-weight: 700;
      }

      .empty {
        padding: 18px 16px;
        color: var(--muted);
      }

      @media (max-width: 840px) {
        .topbar { align-items: flex-start; flex-direction: column; padding: 16px 0; }
        .grid { grid-template-columns: 1fr; }
        .actions { width: 100%; }
        button, a.button { flex: 1; min-width: 130px; }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap topbar">
        <div>
          <h1>Bot RUNT Dashboard</h1>
          <div class="subtitle">Ejecucion, logs y resultados del proceso de consulta vehicular</div>
        </div>
        <div class="actions">
          <button id="runBtn" class="primary">Ejecutar</button>
          <button id="stopBtn" class="danger">Detener</button>
          <button id="refreshBtn">Actualizar</button>
          <a class="button" href="/descargar">Descargar CSV</a>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="grid">
        <section class="panel">
          <h2>Estado</h2>
          <div class="status">
            <div class="metric">
              <span>Bot</span>
              <strong id="botState">Revisando</strong>
            </div>
            <div class="metric">
              <span>Resultados</span>
              <strong id="resultState">Revisando</strong>
            </div>
            <div class="metric">
              <span>Registros visibles</span>
              <strong id="rowCount">0</strong>
            </div>
          </div>
        </section>

        <section class="panel">
          <h2>Logs en vivo</h2>
          <div id="logs" class="logs"></div>
        </section>
      </div>

      <section class="panel" style="margin-top:18px;">
        <h2>Resultados</h2>
        <div class="table-wrap">
          <table id="resultsTable"></table>
          <div id="emptyResults" class="empty">No hay resultados CSV disponibles.</div>
        </div>
      </section>
    </main>

    <script>
      const socket = io();
      const logs = document.getElementById("logs");
      const runBtn = document.getElementById("runBtn");
      const stopBtn = document.getElementById("stopBtn");
      const refreshBtn = document.getElementById("refreshBtn");
      const botState = document.getElementById("botState");
      const resultState = document.getElementById("resultState");
      const rowCount = document.getElementById("rowCount");
      const table = document.getElementById("resultsTable");
      const emptyResults = document.getElementById("emptyResults");

      function addLog(message, type = "info") {
        const line = document.createElement("div");
        line.className = `log ${type}`;
        line.textContent = message;
        logs.appendChild(line);
        logs.scrollTop = logs.scrollHeight;
      }

      async function post(url) {
        const res = await fetch(url, { method: "POST" });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || "Error en la solicitud");
        return data;
      }

      async function loadStatus() {
        const res = await fetch("/estado");
        const data = await res.json();
        botState.textContent = data.ejecutando ? "Ejecutando" : "Detenido";
        resultState.textContent = data.resultados_disponibles ? "Disponible" : "No disponible";
        runBtn.disabled = data.ejecutando;
        stopBtn.disabled = !data.ejecutando;
      }

      async function loadResults() {
        const res = await fetch("/resultados");
        const rows = await res.json();
        rowCount.textContent = rows.length;
        table.innerHTML = "";
        emptyResults.style.display = rows.length ? "none" : "block";
        if (!rows.length) return;

        const keys = Object.keys(rows[0]);
        const thead = document.createElement("thead");
        const header = document.createElement("tr");
        keys.forEach((key) => {
          const th = document.createElement("th");
          th.textContent = key;
          header.appendChild(th);
        });
        thead.appendChild(header);
        table.appendChild(thead);

        const tbody = document.createElement("tbody");
        rows.forEach((row) => {
          const tr = document.createElement("tr");
          keys.forEach((key) => {
            const td = document.createElement("td");
            td.textContent = row[key] ?? "";
            tr.appendChild(td);
          });
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);
      }

      runBtn.addEventListener("click", async () => {
        try {
          await post("/ejecutar");
          addLog("Solicitud de ejecucion enviada", "success");
          await loadStatus();
        } catch (err) {
          addLog(err.message, "error");
        }
      });

      stopBtn.addEventListener("click", async () => {
        try {
          await post("/detener");
          await loadStatus();
        } catch (err) {
          addLog(err.message, "error");
        }
      });

      refreshBtn.addEventListener("click", async () => {
        await loadStatus();
        await loadResults();
      });

      socket.on("log", (data) => addLog(data.mensaje, data.tipo));
      socket.on("bot_finished", async () => {
        await loadStatus();
        await loadResults();
      });

      loadStatus();
      loadResults();
      setInterval(loadStatus, 5000);
    </script>
  </body>
</html>
